name: ScaleX-commerce Backend-Ci 

on:
  push:
    branches: [ dev ]
  

# on: 
#   workflow_call:
    

jobs:
  Backend-Checks:
    # Project settings 
    name: Backend CI interation
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: test
    # Steps in the job 
    steps:
      # 1.Checkout 
      - name: Checkout Code 
        uses: actions/checkout@v6

      # 2.Setup Runtime (Build)
      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache-dependency-path: Backend/package-lock.json
      
      # Check the file actions
      - name: Check list files 
        run: |
          ls -R

      # 3.Install dependecies 
      - name: Install deps
        run: |
          cd Backend
          npm install

      # 4.Lint test if persent 
      - name: Lint
        run: |
          cd Backend
          npm run lint --if-present
      
      # 5.Test the Project 
      - name: Run test 
        run: |
          cd Backend
          npm run test --if-present

      # 6.Build the project 
      - name: Build
        run: |
          cd Backend
          npm run build --if-present

  Build-backendImg:
    name: Build and Push to Dockerhub
    runs-on: ubuntu-latest
    needs: Backend-Checks

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v6

      # 2.Setup docker buildX
      - name: Setup docker buildX
        uses: docker/build-push-action@v4
      - name: See the folder path
        run: |
          pwd
          ls
      # 3.Docker login 
      - name: Login DockerHUb
        uses: docker/login-action@v4
        # Use docker creadential to login
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      # 4.Build and push image 
      - name: Build and push image 
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scalex-backend:dev
            ${{ secrets.DOCKER_USERNAME }}/scalex-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/scalex-backend:latest
      # Completion message 
      - name: Completion message
        run: echo "Build and push image successfull"





