name: ScaleX-commerce Backend CI

on:
  push:
    branches: [ dev ]
  

# on: 
#   workflow_call:
    

jobs:
  Backend-Checks:
    name: Backend CI checks
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: test
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  Build-backendImg:
    name: Build and Push to Dockerhub
    runs-on: ubuntu-latest
    needs: Backend-Checks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scalex-backend:dev
            ${{ secrets.DOCKER_USERNAME }}/scalex-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/scalex-backend:latest

      - name: Completion message
        run: echo "Build and push image successful"





