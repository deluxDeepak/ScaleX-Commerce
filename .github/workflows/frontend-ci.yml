name: ScaleX-commerce Frontend CI 

on:
  push:
    branches:
      - dev

# on: 
#   workflow_call:
    

jobs:
  Front-endChecks:
    name: Frontend CI checks
    runs-on: ubuntu-latest
    environment: Staging_secret

    defaults:
      run:
        working-directory: Front-end
    
    steps: 
      - name: Check out
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present


      - name: Build Frontend Bundle
        run: npm run build:staging --if-present
        env:
          VITE_BASE_URL: /api
          VITE_RAZORPAY_KEY_ID: rzp_test_RWNiyGSZRGBfds
        
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      
      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Copy dist
        run: |
          scp -r dist/* ubuntu@${{ secrets.SERVER_IP }}:/var/www/scalex/

  Build-FrontendImg:
    name: Build and Push to Dockerhub
    runs-on: ubuntu-latest
    needs: Front-endChecks

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./Front-end
          file: ./Front-end/Dockerfile.prod
          push: true
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_RAZORPAY_KEY_ID=${{ secrets.VITE_RAZORPAY_KEY_ID }}
            
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scalex-frontend:dev
            ${{ secrets.DOCKER_USERNAME }}/scalex-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/scalex-frontend:latest

      - name: Completion message
        run: echo "Build and push image successful"


        

