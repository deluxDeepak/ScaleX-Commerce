name: ScaleX-commerce Frontend CI 

on:
  push:
    branches:
      - dev

# on: 
#   workflow_call:
    

jobs:
  Front-endChecks:
    name: Frontend Ci intgration
    runs-on: ubuntu-latest
    
    steps: 
      - name: Check out
        uses: actions/checkout@v6
      - name: Node env setup 
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: Front-end/package-lock.json
      - name: Install dependecies
        run: |
          cd Front-end
          npm install
      - name: Lint check 
        run: |
          cd Front-end
          npm run lint --if-present
      - name: Run test 
        run: |
          cd Front-end
          npm run test --if-present
      - name: Build Frontend Bundle
        run: |
          cd Front-end
          npm run build --if-present

  Build-FrontendImg:
    name: Build and Push to Dockerhub
    runs-on: ubuntu-latest
    needs: Front-endChecks

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v6

      # 2.Setup docker buildX
      - name: Setup docker buildX
        uses: docker/build-push-action@v4
      - name: See the folder path
        run: |
          pwd
          ls
      # 3.Docker login 
      - name: Login DockerHUb
        uses: docker/login-action@v4
        # Use docker creadential to login
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      # 4.Build and push image 
      - name: Build and push image 
        uses: docker/build-push-action@v7
        with:
          context: ./Front-end
          file: ./Front-end/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scalex-frontend:dev
            ${{ secrets.DOCKER_USERNAME }}/scalex-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/scalex-frontend:latest
      # Completion message 
      - name: Completion message
        run: echo "Build and push image successfull"


        

