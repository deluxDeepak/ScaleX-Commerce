# ============Overkill the project ===========

name: ScaleX-commerce Integration on Staging VPS
# Runs only after the staging deploy workflow finishes successfully.
# This checks the live staging VPS, not the local CI environment.

# - ye default main branch pe hi run hoga 
# So make this run on stagging same file 
on:
  workflow_run:
    workflows: ["ScaleX-commerce to Staging Deploy"]
    types:
      - completed

jobs:
  integration:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: Staging_secret

    env:
      # Set this secret to your staging VPS base URL, for example:
      # https://staging.your-domain.com or http://YOUR_VPS_IP:4000
      BASE_URL: ${{ secrets.STAGING_BASE_URL }}

    steps:
      - name: Check out deployed commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 2.Setup environment  
      - name: Setup Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      # 3.Install root deps 
      - name: Install deps
        run: npm ci

      - name: Wait for staging VPS to be ready
        run: |
          until curl -fsS "$BASE_URL/api/health"; do
            echo "Waiting for staging VPS..."
            sleep 5
          done

      - name: Run integration test
        run: npm run test:integration
    