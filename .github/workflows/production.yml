name: ScaleX-commerce To production
on:
  push:
    branches:
      - main

jobs:

  # After build and push 
  Deploy-VPS:
    name: DeployMent to Ec2
    runs-on: ubuntu-latest
    environment: production_secret

    env:
      BACKEND_IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/scalex-backend
      FRONTEND_IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/scalex-frontend

      PRODUCTION_BASE_URL: ${{secrets.PRODUCTION_BASE_URL}}
      SOURCE_TAG: staging


    steps:
      # 1. Login to Dockerhub
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:

          # This will take from repository secret 
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      # 1.Pull staging image 
      - name: Pull Backend Staging image 
        run: |
          docker pull $BACKEND_IMAGE_REPO:$SOURCE_TAG

      - name: Pull frontend Staging image 
        run: |
          docker pull $FRONTEND_IMAGE_REPO:$SOURCE_TAG

      # 2.Tag the image 
      - name: Tag staging image 
        run: |
          docker tag $BACKEND_IMAGE_REPO:$SOURCE_TAG $BACKEND_IMAGE_REPO:production
          docker tag $BACKEND_IMAGE_REPO:$SOURCE_TAG $BACKEND_IMAGE_REPO:latest

          docker tag $FRONTEND_IMAGE_REPO:$SOURCE_TAG $FRONTEND_IMAGE_REPO:production
          docker tag $FRONTEND_IMAGE_REPO:$SOURCE_TAG $FRONTEND_IMAGE_REPO:latest

      # 3.Push the stagged image 
      - name: Push production image 
        run: |
          docker push $BACKEND_IMAGE_REPO:production
          docker push $FRONTEND_IMAGE_REPO:production

      # 4.Deploy to vps With production environment
      - name: Deploy via SSH 
        uses: appleboy/ssh-action@v1
        with:
          # 1.login with credential 
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          # 2.Run image through scripts 
          script: |
            cd app
            docker compose pull
            docker compose up -d
            docker compose exec backend npm run seed 
          

      - name: Wait for app to start 
        run: sleep 15
      - name: Check the health
        run: |
          curl -fsS "$PRODUCTION_BASE_URL/api/health";do
            echo "Waiting for production health endpoint.."
          done

      # Deployment completion message 
      - name: Completion message 
        run: echo Deployed to VPS sucessful😊✅




        
  