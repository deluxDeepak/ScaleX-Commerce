# Staging deploye (deploye to vps but staging image )

name: ScaleX-commerce to Staging Deploy
# 1.pull image 
# 2.Deploy to vps
# 3.Add new tag staging after deploy is successfull
# Change tag to docker hub 
# Push with new tag:

on:
  push:
    branches:
      - staging

jobs:
  Deploy-toVps:
    name: Deploy to Ec2 Staging
    runs-on: ubuntu-latest
    # Take from Github 
    environment: Staging_secret

    # Dev branch pushed the devlopment image 
    # Use that image to test the stable version 
    env:
      BACKEND_IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/scalex-backend
      FRONTEND_IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/scalex-frontend

      # https://staging.your-domain.com or http://YOUR_VPS_IP:4000
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      SOURCE_TAG: dev

    # 1. Login to Dockerhub
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      # 1.Pull the image 
      - name: Pull backend image by stable tag
        run: |
          docker pull $BACKEND_IMAGE_REPO:$SOURCE_TAG

      - name: Pull frontend image by stable tag
        run: |
          docker pull $FRONTEND_IMAGE_REPO:$SOURCE_TAG

      # 2.Tag the image 
      - name: Tag staging image 
        run: |
          docker tag $BACKEND_IMAGE_REPO:$SOURCE_TAG $BACKEND_IMAGE_REPO:staging
          docker tag $BACKEND_IMAGE_REPO:$SOURCE_TAG $BACKEND_IMAGE_REPO:latest
          docker tag $FRONTEND_IMAGE_REPO:$SOURCE_TAG $FRONTEND_IMAGE_REPO:staging
          docker tag $FRONTEND_IMAGE_REPO:$SOURCE_TAG $FRONTEND_IMAGE_REPO:latest
          
      # 3.Push the stagged image 
      - name: Push Staging image
        run: |
          docker push $BACKEND_IMAGE_REPO:staging
          docker push $FRONTEND_IMAGE_REPO:staging

      # Deploy to vps 
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1
        with:
           # 1.login with credential 
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # 1.pull the Front-end image with tag
          # 2. pull backend image with tag (staging)
          # 3.compose file should persent on vps 
          script: |
            cd app
            docker compose pull
            docker compose up -d

      # Wait for the app
      - name: Wait for app
        run: sleep 15
      # Check the health of the app
      - name: Health check
        run: |
        
          until curl -fsS "$STAGING_BASE_URL/api/health"; do
            echo "Waiting for staging health endpoint..."
            sleep 5
          done
        
      # Deployment completion message 
      - name: Completion message 
        run: echo Deployed to VPS sucessful😊✅


  # Backend should be running at that time 
  integration:
    runs-on: ubuntu-latest
    # Take from Github 
    environment: Staging_secret
    needs: ["Deploy-toVps"]
    if: ${{ needs.Deploy-toVps.result == 'success' }}

    env:
      # Set this secret to your staging VPS base URL, for example:
      # https://staging.your-domain.com or http://YOUR_VPS_IP:4000
      BASE_URL: ${{ secrets.STAGING_BASE_URL }}

    steps:
      - name: Check out deployed commit
        uses: actions/checkout@v6

      # 2.Setup environment  
      - name: Setup Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      # 3.Install root deps 
      - name: Install deps
        run: npm ci

      - name: Wait for staging VPS to be ready
        run: |
          until curl -fsS "$BASE_URL/api/health"; do
            echo "Waiting for staging VPS..."
            sleep 5
          done

      - name: Run integration test
        run: npm run test:integration
  
  # Backend + Front-end should be running at same time 
  e2e:
    runs-on: ubuntu-latest
    needs: ["integration"]
    if: ${{ needs.integration.result == 'success' }}
    environment: Staging_secret
    
    # Frontend base url do 
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}

    steps:
      - name: Ceckout branch Code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: 
          node-version: 24
          cache: 'npm'
      
      - name: Install root deps
        run: npm ci

      - name: Wait for staging VPS to be ready
        run: |
          until curl -fsS "$PLAYWRIGHT_BASE_URL/api/health"; do
            echo "Waiting for staging health endpoint..."
            sleep 5
          done

      # Install browser for E2e test 
      - name: Install Playwright browser 
        run: npx playwright install --with-deps

      # Runs all test 
      - name: Run e2e Test 
        run: npm run test:e2e