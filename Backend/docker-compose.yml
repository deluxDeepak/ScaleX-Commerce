version: "3.9"
name: e-commerce-Backend 

networks:
  app-network:
    driver: bridge

services:
  
      
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
    networks:
      - app-network
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network
  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: minio
    restart: always

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data
    networks:
      - app-network
  
  backend:
    build: .
    # container_name: backend Scale nahi hoga container name same nahi ho sakta hai do ya 3 ka 
    env_file:
      - .env.docker
    # ports:  []
      # - "3000:3000" single backend ke liye hai lekin scale karne pe scale nahi hoga 
    depends_on:
      - redis
      - mongo
      - minio
    networks:
      - app-network


volumes:
  minio_data:
  mongo_data:
  nginx_cache: