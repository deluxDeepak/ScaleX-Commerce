worker_processes auto;

events {
    worker_connections 8192;
    multi_accept on;
}

http {

    # http block me mime.types include karo
    # if(nginix file remove karke purana default hata diye work nahi karega )
    # include /etc/nginx/mime.types;
    include mime.types;
    default_type application/octet-stream;


    # Cache path define karo
    # proxy_cache_path /var/cache/nginx;
    proxy_cache_path /data/cache/nginx
    levels=1:2
    use_temp_path=off
    keys_zone=my_cache:10m
    inactive=60m
    max_size=1g ;

    # Upstream =============
    # Backend upstream =====
    upstream backend {
        server backend:4000;

    }

    server {
        # ServerBlock cache enable karo

        listen 80;
        # The stylesheet http://localhost/assets/index-hFENKH5T.css was not loaded because its MIME type, “text/plain”, is not “text/css”. only html load karega
        # iska original types all load kara do

        # Frontend Static ===========
        root /usr/share/nginx/html;
        index index.html;
        # ==============================
        location /assets/ {
            try_files $uri =404;
        }


        # Frontend location : Production me nginx frontend ko proxy nahi karta
        location / {
            try_files $uri /index.html;
        }


        # Product cache ==============
        location /api/products {

            proxy_pass http://backend;

            # Yehan only product cache kar rehe hai
            # direct /api location me sab kuch cahche ho jayega(dangerous)
            # - /api/users
            # - /api/orders
            # - /api/profile
            # - /api/login 😬
            # - /api/cart

            proxy_cache my_cache;
            proxy_cache_valid 200 60s;

        }

        # No cahche for auth api
        location /api/auth {
            proxy_pass http://backend;
            proxy_cache  off;
        }

        # No cache for the User api 
        location /api/user {
            proxy_pass http://backend;
            proxy_cache  off;
        }

        # api cache ------------------
        # longest location matche pehle karta hai
        location /api/ {
            proxy_pass http://backend;

            proxy_cache my_cache;
            # Agar response status 200 hai → to cache me 1 minute ke liye store karo
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;

            # ===========✅ stale cache serve karna
            # ===========✅ zero downtime cache
            # error
            # Backend error de raha → cache use karo
            # timeout
            # Backend slow hai → cache use karo
            # updating
            # Cache expire ho gaya hai, but backend se new data aa raha hai
            proxy_cache_use_stale error timeout updating;

            # Debugging ke liye hai (Ye header show karta hai )
            # 1.Response header ---hum bhjte hai bwoser ko 
            add_header X-Cache $upstream_cache_status;

            # proxy headers====================

            # ye sab kuch nahi milega agr  header nahi bheja to
            # - cookie ❌
            # - authorization ❌
            # - content-type ❌
            # - origin ❌
            # 2.Request headers ---browser humko bhejta hai 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Real time ke liye hai ---jaise websockets aur real-time dashboard
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Auth break agr na ho to
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;


        }

        # Home cahche =====================
    }
}