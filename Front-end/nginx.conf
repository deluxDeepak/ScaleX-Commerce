worker_processes auto;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    proxy_cache_path /data/cache/nginx
    levels=1:2
    use_temp_path=off
    keys_zone=my_cache:10m
    inactive=60m
    max_size=1g ;

    upstream backend {
        server backend:4000;

    }

    server {

        listen 80;

        # Frontend Static ===========
        root /usr/share/nginx/html;
        index index.html;
        # ==============================
        location /assets/ {
            try_files $uri =404;
        }


        # Frontend location : Production me nginx frontend ko proxy nahi karta
        location / {
            try_files $uri /index.html;
        }


        # Product cache ==============
        location /api/products/ {

            proxy_pass http://backend;
            proxy_cache off;
            

        }

        # No cahche for auth api
        location /api/auth/ {
            proxy_pass http://backend;
            proxy_cache off;
        }

        # No cache for the User api
        location /api/user/ {
            proxy_pass http://backend;
            proxy_cache off;
        }

        # api cache ------------------
        # longest location matche pehle karta hai
        location /api/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Connection "";

            proxy_cache off;
            
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;


        }

        # Home cahche =====================
    }
}