
services:
  mongo:
    image: mongo
    restart: always

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    env_file: ./Backend/.env.docker
  
  redis:
    image: redis
    restart: always

  backend:
    build: ./Backend
    env_file: ./Backend/.env.docker
    ports:
      - "4000:4000"
    depends_on: 
      - mongo
      - redis
      - minio

  frontend:
    build: ./Front-end
    ports:
      - "5173:5173"
    depends_on:
      - backend

