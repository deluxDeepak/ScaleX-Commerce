# logs kahan se aayenge
# kahan store honge
# kaise index honge
# kis port pe chalega
# auth chahiye ya nahi
# Loki ko sirf storage_config dena enough nahi hota, usko schema_config bhi chahiye hota hai, warna container start hote hi crash ho jata hai.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki

  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

  replication_factor: 1

  ring:
    kvstore:
      store: inmemory


schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h


storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache

  filesystem:
    directory: /loki/chunks


limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: false


compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m