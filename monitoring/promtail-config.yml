# Promtail -- log file read karo → Loki ko bhejo

server:
  http_listen_port: 9080


clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: express-app
          __path__: /var/lib/docker/containers/*/*.log